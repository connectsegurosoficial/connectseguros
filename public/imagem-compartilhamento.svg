<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061a2f"/>
      <stop offset="1" stop-color="#0b2c55"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#19b56a"/>
      <stop offset="1" stop-color="#4da3ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <circle cx="170" cy="520" r="220" fill="#4da3ff" opacity="0.10"/>
  <circle cx="1060" cy="120" r="260" fill="#19b56a" opacity="0.10"/>
  <circle cx="820" cy="520" r="320" fill="#4da3ff" opacity="0.06"/>

  <g filter="url(#shadow)">
    <rect x="92" y="88" width="1016" height="454" rx="28" fill="#0a2242" opacity="0.72"/>
  </g>

  <rect x="130" y="130" width="220" height="10" rx="5" fill="url(#accent)"/>

  <text x="130" y="220" fill="#ffffff" font-family="Plus Jakarta Sans, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="56" font-weight="800">
    Connect Seguros
  </text>

  <text x="130" y="286" fill="#d6e3f3" font-family="Plus Jakarta Sans, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="34" font-weight="700">
    Sua proteção, nossa conexão.
  </text>

  <text x="130" y="352" fill="#b9cbe3" font-family="Plus Jakarta Sans, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="24" font-weight="500">
    Seguro auto, empresarial, residencial e muito mais.
  </text>

  <g>
    <rect x="130" y="400" width="360" height="64" rx="16" fill="#19b56a"/>
    <text x="160" y="442" fill="#0a2242" font-family="Plus Jakarta Sans, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="22" font-weight="800">
      Cotação grátis no WhatsApp
    </text>
  </g>

  <text x="130" y="510" fill="#9fb4d3" font-family="Plus Jakarta Sans, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="18" font-weight="600">
    Três Lagoas - MS • Atendimento online para todo o Brasil
  </text>
</svg>
